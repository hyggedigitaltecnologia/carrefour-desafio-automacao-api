[pytest]
testpaths = tests
markers =
    smoke: Testes de sanidade rapida
    contract: Validacao de contrato da API
    regression: Suite completa de regressao
    security: Testes de seguranca e validacao de entrada
    e2e: Fluxos end-to-end completos
addopts = -v --tb=short --strict-markers
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
log_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S
