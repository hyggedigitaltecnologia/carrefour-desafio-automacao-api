name: Testes API ServeRest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Executar testes de smoke
        run: |
          pytest -m smoke \
            --junitxml=reports/smoke-results.xml \
            --html=reports/smoke-report.html \
            --self-contained-html \
            --alluredir=reports/allure-results \
            -v 2>&1 | tee reports/smoke-output.txt
        env:
          BASE_URL: https://serverest.dev

      - name: Gerar summary dos smoke tests
        if: always()
        run: python .github/scripts/generate_summary.py reports/smoke-results.xml "Smoke Tests" >> $GITHUB_STEP_SUMMARY

      - name: Upload relatorio smoke
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: reports/
          retention-days: 15

  regression-tests:
    name: Regression Tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Executar suite completa de regressao
        id: run_tests
        run: |
          pytest \
            --junitxml=reports/regression-results.xml \
            --html=reports/regression-report.html \
            --self-contained-html \
            --alluredir=reports/allure-results \
            -v 2>&1 | tee reports/regression-output.txt
        env:
          BASE_URL: https://serverest.dev

      - name: Gerar summary da regressao
        if: always()
        run: python .github/scripts/generate_summary.py reports/regression-results.xml "Suite de Regressao Completa" >> $GITHUB_STEP_SUMMARY

      - name: Publicar resultado dos testes
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: API Test Report
          path: reports/regression-results.xml
          reporter: java-junit

      - name: Upload relatorio de regressao
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-report
          path: reports/
          retention-days: 30
